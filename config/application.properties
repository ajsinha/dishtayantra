# ==========================================================================
# Database (v2.0.0) - users, roles, API keys
# ==========================================================================
# Engine: sqlite | postgresql
db.engine=sqlite
# SQLite: file path; tables are created automatically on first start.
db.sqlite.path=data/dishtayantra.db
#
# --- PostgreSQL example (tables are NOT auto-created; apply
#     config/schema/schema_postgres.sql once) -------------------------------
#db.engine=postgresql
#db.postgres.host=localhost
