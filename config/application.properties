# MCP Server Configuration

app.name=DishtaYantra
# Informational only. The authoritative runtime version is core/version.py
# (VERSION); every UI/API surface reports that, never this value. Bump on release.
app.version=5.49.0

# Author and Copyright Information
app.author.name=Ashutosh Sinha
app.author.email=ajsinha@gmail.com
app.copyright.years=2025-2030
app.copyright.holder=Ashutosh Sinha
app.github.repo=https://github.com/ajsinha/dishtayantra
app.trademark.notice=DishtaYantra™ is a trademark of Ashutosh Sinha

server.host=0.0.0.0
server.port=5002
server.debug=False

# Logging - handled at the formatter level (core/log_config.py); changing
# format reformats every log line without touching call sites.
#   logging.format: text | json
#   logging.json_fields: comma list from {timestamp,epoch,level,logger,message,
#                        module,func,line,path,process,thread}
logging.format=json
logging.level=INFO
# Note (v5.14.0): the root level and per-logger levels can also be changed at
# RUNTIME (no restart) from the admin Logging Control page (/admin/logging).
# Runtime changes are ephemeral and revert to logging.level above on restart.

# Performance (v5.14.0) - optional GC tuning applied once at startup.
#   performance.gc.freeze: gc.freeze() after load so steady-state collections
#     skip startup objects (safe; default true).
#   performance.gc.threshold: gen-0 collection threshold (default: unchanged).
performance.gc.freeze=true
# performance.gc.threshold=10000
logging.json_fields=timestamp,level,logger,message
logging.json_include_extra=true
logging.text_format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

# Backpressure (credit-based flow control). Opt-in; OFF = unchanged behaviour.
#   policy: block (publisher waits for a credit) | drop (drop, counted)
#   timeout_ms: under 'block', max wait before a drop (0 = forever). With a
#   single-threaded producer/consumer, prefer 'drop' or a finite timeout.
backpressure.enabled=false
backpressure.capacity=1000
backpressure.policy=block
backpressure.timeout_ms=0

# Async egress (WAL-backed decoupled publication) - OFF by default. When enabled,
# a publisher's publish() becomes a non-blocking WAL append drained by a
# background writer. Endpoints are taken from the publisher definitions (no extra
# config). See the "Async Egress (WAL-Backed Publication) Guide" in Help.
egress.async.enabled=false
# when async is enabled, the default for publishers that do not set async_egress
egress.async.default=true
# bounded egress worker pool size (per process); destinations multiplex onto it
egress.worker.count=4
egress.wal.backend=filelog
egress.wal.path=./data/egress_wal
egress.wal.max_bytes=2147483648
egress.wal.high_water_pct=80
egress.wal.segment_bytes=134217728
egress.wal.fsync=interval
egress.wal.fsync_interval_ms=50
egress.batch.max_records=500
egress.overflow.policy=block
egress.overflow.block_timeout_ms=0

# Web Application Configuration (v2.0.0 - FastAPI)
# Session signing secret. REQUIRED - the server refuses to start without it.
# Override via the SECRET_KEY env var in production.
app.secret_key=${SECRET_KEY:default_secret_key_change_in_production}
#
#
external.module.path.1=/opt/custom_modules
external.module.path.2=${HOME}/my_plugins
external.module.path.analytics=/opt/analytics
#
# User Registry Configuration
# Auto-reload interval for users.json file (in seconds, default: 600 = 10 minutes)
user.registry.reload_interval=600

# Kafka Connection Configuration (v1.7.6)
# Number of connection retry attempts before giving up
kafka.connection.max_retries=5
# Delay between retry attempts (seconds)
kafka.connection.retry_delay=3
# Enable automatic reconnection on broken connections
kafka.connection.auto_reconnect=true
# Health check interval for detecting broken connections (seconds)
kafka.connection.health_check_interval=30

# LMDB Zero-Copy Data Exchange Configuration (v1.1.2)
# Path to LMDB database for zero-copy data exchange with native calculators
lmdb.db.path=${LMDB_DB_PATH:/tmp/dishtayantra_lmdb}
# Maximum database size in bytes (default: 1GB)
lmdb.map.size=1073741824
# Maximum number of named databases
lmdb.max.dbs=100
# Time-to-live for cached data entries (seconds)
lmdb.ttl.seconds=300
# Maximum number of concurrent readers
lmdb.max.readers=126
# Cleanup interval (seconds)
lmdb.cleanup.interval=60

# ==========================================================================
# Storage Abstraction (v2.0.0)
# ==========================================================================
# Provider for ALL stored objects (DAG configs etc.).
# Supported: filesystem | s3 | azureblob | gcs
storage.provider=filesystem
# Filesystem provider: root directory all logical paths are relative to.
storage.filesystem.root=./
# Logical prefix (relative to the storage root) for DAG JSON files.
storage.dags.prefix=config/dags
#
