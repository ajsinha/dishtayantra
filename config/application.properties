# MCP Server Configuration

app.name=DishtaYantra
app.version=3.2.0

# Author and Copyright Information
app.author.name=Ashutosh Sinha
app.author.email=ajsinha@gmail.com
app.copyright.years=2025-2030
app.copyright.holder=Ashutosh Sinha
app.github.repo=https://github.com/ajsinha/dishtayantra
app.trademark.notice=DishtaYantra™ is a trademark of Ashutosh Sinha

server.host=0.0.0.0
server.port=5002
server.debug=False

# Web Application Configuration (v2.0.0 - FastAPI)
# Session signing secret. REQUIRED - the server refuses to start without it.
# Override via the SECRET_KEY env var in production.
app.secret_key=${SECRET_KEY:default_secret_key_change_in_production}
#
#
external.module.path.1=/opt/custom_modules
external.module.path.2=${HOME}/my_plugins
external.module.path.analytics=/opt/analytics
#
# User Registry Configuration
# Auto-reload interval for users.json file (in seconds, default: 600 = 10 minutes)
user.registry.reload_interval=600

# Kafka Connection Configuration (v1.7.6)
# Number of connection retry attempts before giving up
kafka.connection.max_retries=5
# Delay between retry attempts (seconds)
kafka.connection.retry_delay=3
# Enable automatic reconnection on broken connections
kafka.connection.auto_reconnect=true
# Health check interval for detecting broken connections (seconds)
kafka.connection.health_check_interval=30

# LMDB Zero-Copy Data Exchange Configuration (v1.1.2)
# Path to LMDB database for zero-copy data exchange with native calculators
lmdb.db.path=${LMDB_DB_PATH:/tmp/dishtayantra_lmdb}
# Maximum database size in bytes (default: 1GB)
lmdb.map.size=1073741824
# Maximum number of named databases
lmdb.max.dbs=100
# Time-to-live for cached data entries (seconds)
lmdb.ttl.seconds=300
# Maximum number of concurrent readers
lmdb.max.readers=126
# Cleanup interval (seconds)
lmdb.cleanup.interval=60

# ==========================================================================
# Storage Abstraction (v2.0.0)
# ==========================================================================
# Provider for ALL stored objects (DAG configs etc.).
# Supported: filesystem | s3 | azureblob | gcs
storage.provider=filesystem
# Filesystem provider: root directory all logical paths are relative to.
storage.filesystem.root=./
# Logical prefix (relative to the storage root) for DAG JSON files.
storage.dags.prefix=config/dags
#
# --- S3 example -----------------------------------------------------------
#storage.provider=s3
#storage.s3.bucket=my-dishtayantra-bucket
#storage.s3.prefix=dishtayantra
#storage.s3.region=us-east-1
## Optional custom endpoint (MinIO/localstack) and explicit credentials:
#storage.s3.endpoint_url=http://localhost:9000
#storage.s3.access_key_id=${AWS_ACCESS_KEY_ID:}
#storage.s3.secret_access_key=${AWS_SECRET_ACCESS_KEY:}
#
# --- Azure Blob example ----------------------------------------------------
#storage.provider=azureblob
#storage.azureblob.connection_string=${AZURE_STORAGE_CONNECTION_STRING:}
#storage.azureblob.container=dishtayantra
#storage.azureblob.prefix=dishtayantra
#
# --- GCS example -----------------------------------------------------------
#storage.provider=gcs
#storage.gcs.bucket=my-dishtayantra-bucket
#storage.gcs.prefix=dishtayantra
#storage.gcs.credentials_file=/etc/gcp/service-account.json

# ==========================================================================
# Database (v2.0.0) - users, roles, API keys
# ==========================================================================
# Engine: sqlite | postgresql
db.engine=sqlite
# SQLite: file path; tables are created automatically on first start.
db.sqlite.path=data/dishtayantra.db
#
# --- PostgreSQL example (tables are NOT auto-created; apply
#     config/schema/schema_postgres.sql once) -------------------------------
#db.engine=postgresql
#db.postgres.host=localhost
#db.postgres.port=5432
#db.postgres.database=dishtayantra
#db.postgres.user=${POSTGRES_USER:dishtayantra}
#db.postgres.password=${POSTGRES_PASSWORD:}

# ==========================================================================
# High Availability Manager (v2.0.0)
# ==========================================================================
# Provider: none | zookeeper | redis | s3 | socket
# 'none' = standalone, this instance is always primary.
ha.provider=none
#
# --- Zookeeper election ----------------------------------------------------
#ha.provider=zookeeper
#ha.zookeeper.hosts=localhost:2181
#ha.zookeeper.election_path=/dishtayantra/election
#
# --- Redis lease -----------------------------------------------------------
#ha.provider=redis
#ha.redis.host=localhost
#ha.redis.port=6379
#ha.redis.lock_key=dishtayantra:ha:lock
#ha.redis.lease_seconds=10
#
# --- S3 lease ---------------------------------------------------------------
#ha.provider=s3
#ha.s3.bucket=my-dishtayantra-bucket
#ha.s3.lease_key=dishtayantra/ha/lease.json
#ha.s3.region=us-east-1
#ha.s3.lease_seconds=15
#
# --- Socket (exclusive TCP bind) --------------------------------------------
#ha.provider=socket
#ha.socket.host=0.0.0.0
#ha.socket.port=5599
#ha.socket.retry_seconds=3

# ==========================================================================
# DAG Scheduling - day-of-week + holiday calendars (v2.1.0)
# ==========================================================================
# Logical storage prefix where holiday calendar JSON files live. Baked-in
# calendars: usa.json + canada.json (market holidays 2026-2040, regenerate
# or extend with scripts/generate_holiday_calendars.py).
holidays.prefix=config/holidays
# Calendar cache TTL in seconds (hard-capped at 300). Intraday edits to a
# calendar file take effect automatically within this TTL.
holidays.reload_seconds=180
# How often each DAG's schedule block is re-read from storage (hard-capped
# at 240). Combined with the 60s monitor loop this guarantees intraday
# schedule edits take effect within 5 minutes.
schedule.refresh_seconds=240
