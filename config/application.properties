# ==========================================================================
# DAG Scheduling - day-of-week + holiday calendars (v2.1.0)
# ==========================================================================
# Logical storage prefix where holiday calendar JSON files live. Baked-in
# calendars: usa.json + canada.json (market holidays 2026-2040, regenerate
# or extend with scripts/generate_holiday_calendars.py).
holidays.prefix=config/holidays
# Calendar cache TTL in seconds (hard-capped at 300). Intraday edits to a
# calendar file take effect automatically within this TTL.
holidays.reload_seconds=180
# How often each DAG's schedule block is re-read from storage (hard-capped
# at 240). Combined with the 60s monitor loop this guarantees intraday
# schedule edits take effect within 5 minutes.
schedule.refresh_seconds=240

# Audit trail retention. The audit log (Admin -> Audit Trail) is purged by a
# background sweep: events older than audit.retention_days are deleted.
#   audit.retention_days        : days to keep (default 15; <= 0 disables purging)
#   audit.retention_sweep_hours : how often the sweep runs (default 6)
audit.retention_days=15
audit.retention_sweep_hours=6

# --- Flow Time-Travel (v5.26.0) ---------------------------------------------
# Records the DAG change-log (node fires) so a time window can be replayed and
# downloaded. OFF by default; non-blocking and disable-able at runtime via
# POST /api/flow/enable | /api/flow/disable (admin) or the UI toggle on /flow.
#   flow_recorder.enabled            : capture on at startup (default true)
#   flow_recorder.store              : sqlite | dao | noop | paimon (default sqlite)
#   flow_recorder.store_path         : sqlite file (default data/flow_history.db)
#   flow_recorder.maxsize            : bounded queue depth; overflow is dropped
#                                      (counted), never blocks compute (default 100000)
#   flow_recorder.max_payload_bytes  : per-side JSON cap on captured values (default 2048)
#   flow_recorder.sample_rate        : 1.0 = every fire; lower to shed load (default 1.0)
#   flow_recorder.retention_hours    : history window kept (default 24; <= 0 disables)
#   flow_recorder.retention_sweep_minutes : sweep cadence (default 30)
flow_recorder.enabled=true
flow_recorder.store=sqlite
flow_recorder.store_path=data/flow_history.db
flow_recorder.maxsize=100000
flow_recorder.max_payload_bytes=2048
flow_recorder.sample_rate=1.0
flow_recorder.retention_hours=24
flow_recorder.retention_sweep_minutes=30
# Flow replay (UI) web-tier guards - protect the compute host from replay load.
# The compute path is already isolated (separate WAL flow DB; enqueue-only hot
# path), so these only bound web-tier work, not DAG computation.
#   max_concurrent_streams : simultaneous SSE replays allowed (default 5); over
#                            the cap, a replay gets a clear "server busy" notice.
#   stream_max_seconds     : hard cap on a single replay's duration (default 120);
#                            also bounds the WAL read snapshot a replay holds open.
flow_recorder.max_concurrent_streams=5
flow_recorder.stream_max_seconds=120

# --- SLO / staleness alerting (v1) ------------------------------------------
# Output-change staleness from the flow history: a rule breaches when a DAG (or a
# named node) has produced no OUTPUT CHANGE within max_age_seconds. Evaluated on
# demand at GET /api/alerts and shown on Admin -> System Monitoring. Because of
# the equality gate this is "output-change" staleness (a constant-but-healthy
# stream will read as stale). Disabled by default; define rules in a JSON file.
#   alerts.enabled     : evaluate rules (default false)
#   alerts.rules_file  : JSON file of rules (default empty = no rules). See
#                        config/alerts.example.json for the format.
alerts.enabled=false
alerts.rules_file=

# --- Service-plane split (v5.29.0) -------------------------------------------
# Manage multiple DishtaYantra instances from one UI. Empty trusted list (the
# default) => this instance manages only its local DAG server, exactly as before.
# Admins register trusted servers in the UI (Manage servers); their API keys are
# stored encrypted at rest using the secret in the env var named below.
service.instance_name=DishtaYantra
# Environment variable that holds the at-rest encryption secret for trusted-
# server API keys (a passphrase or a url-safe base64 Fernet key). Required only
# if you register trusted servers. NEVER commit the secret itself.
service.secret_env=DY_SECRET_KEY
